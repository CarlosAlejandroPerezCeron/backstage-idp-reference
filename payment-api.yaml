apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: payment-api
  title: Payment API
  description: >
    Core payment processing API. Handles authorization, capture, refunds,
    and settlement across multiple payment rails.
  annotations:
    github.com/project-slug: CarlosAlejandroPerezCeron/payment-api
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: payment-api
    backstage.io/kubernetes-namespace: payment
    datadog/dashboard-url: https://app.datadoghq.com/dashboard/xxx
    argocd/app-name: payment-api
    pagerduty.com/service-id: P1234XY
  tags:
    - python
    - fastapi
    - payments
    - pci-dss
  links:
    - url: https://runbooks.infravix.io/payment-api
      title: Runbook
      icon: docs
    - url: https://app.datadoghq.com/dashboard/xxx
      title: Datadog Dashboard
      icon: dashboard
spec:
  type: service
  lifecycle: production
  owner: team-payments
  system: payment-platform
  dependsOn:
    - component:default/user-service
    - resource:default/payment-db
  providesApis:
    - payment-api-v2
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payment-api-v2
  description: Payment processing REST API v2
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: openapi
  lifecycle: production
  owner: team-payments
  system: payment-platform
  definition:
    $text: https://raw.githubusercontent.com/CarlosAlejandroPerezCeron/payment-api/main/openapi.yaml
